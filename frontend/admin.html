<!DOCTYPE html>
<html>
<head>
<title>Admin Chat</title>

<style>
body {
  font-family: "Inter", sans-serif;
  background: #f5f5f5; /* ✅ match homepage */
  margin: 0;
  color: #111;
}


.topbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 20px 30px;
  background: white;
  box-shadow: 0 4px 10px rgba(0,0,0,0.05);
}

.topbar h2 {
  margin: 0;
}

.topbar button {
  margin-left: 10px;
  padding: 10px 16px;
  background: #111;
  border: none;
  color: white;
  border-radius: 20px;
  cursor: pointer;
}

.topbar button:hover {
  background: #333;
}


.container {
  display: flex;
  height: calc(100vh - 80px);
}


.users {
  width: 260px;
  background: white;
  border-right: 1px solid #eee;
  overflow-y: auto;
  padding: 10px;
}
.user.active {
  background: #111;
  color: white;
}
.user {
  padding: 12px;
  cursor: pointer;
  border-radius: 10px;
  margin-bottom: 6px;
  transition: 0.2s;
}

.user:hover {
  background: #f0f0f0;
}


.chat-area {
  flex: 1;
  display: flex;
  flex-direction: column;
  background: #f5f5f5;
}

.chat-box {
  flex: 1;
  padding: 20px;
  overflow-y: auto;
  scroll-behavior: smooth;
}

#typing {
  padding-left: 20px;
  color: #666;
  font-style: italic;
}
/* 💬 MESSAGES */
.msg {
  margin: 10px 0;
  padding: 12px 16px;
  border-radius: 20px;
  max-width: 60%;
  font-size: 14px;
  word-break: break-word;
}

.msg {
  transition: 0.2s;
}

.msg:hover {
  transform: scale(1.02);
}


.user-msg {
  background: #e5e7eb;
  color: #111;
}


.admin-msg {
  background: #111;
  color: white;
  margin-left: auto;
}


.input-box {
  display: flex;
  padding: 15px;
  background: white;
  border-top: 1px solid #eee;
  gap: 10px;
}

.input-box input {
  flex: 1;
  padding: 12px;
  border-radius: 20px;
  border: 1px solid #ddd;
  outline: none;
}

.input-box button {
  padding: 12px 20px;
  background: #111;
  color: white;
  border: none;
  border-radius: 20px;
  cursor: pointer;
}

.input-box button:hover {
  background: #333;
}
</style>
</head>

<body>


<div class="topbar">
  <h2>Admin Panel</h2>

  <div>
    <button onclick="goHome()">Home</button>
    <button onclick="logout()">Logout</button>
  </div>
</div>

<div class="container">

  <div style="padding:10px;">
  <button onclick="loadChatUsers()">Chat Users</button>
  <button onclick="loadRequests()">Support Requests</button>
</div>

  <!-- USER LIST -->
  <div class="users" id="userList"></div>

  <!-- CHAT -->
  <div class="chat-area">
    <div id="chatHeader" style="
  padding: 15px 20px;
  background: white;
  border-bottom: 1px solid #eee;
  font-weight: 600;
">
  Select a user
</div>
    <div class="chat-box" id="chatBox">
  <p style="opacity:0.5;">Select a user to start chatting</p>
</div>
    <p id="typing" style="opacity:0.7; font-size:12px;"></p>

    <div class="input-box">
      <input id="replyInput" placeholder="Type reply">
      <button onclick="sendReply()">Send</button>
    </div>
  </div>

</div>

<script src="/socket.io/socket.io.js"></script>

<script>
const socket = io();

const replyInput = document.getElementById("replyInput");

replyInput.addEventListener("input", () => {
  if (!currentUser) return;

  socket.emit("typing", {
    email: currentUser,
    sender: "admin"
  });

  clearTimeout(window.typingTimeout);

  window.typingTimeout = setTimeout(() => {
   socket.emit("stop_typing", {
  email: currentUser,
  sender: "admin"
});
  }, 1000);
});

socket.on("typing", (data) => {
  if (data.sender === "user" && data.email === currentUser) {
    document.getElementById("typing").innerText = "User is typing...";
  }
});

socket.on("stop_typing", (data) => {
  if (data.email === currentUser && data.sender === "user") {
    document.getElementById("typing").innerText = "";
  }
});

let currentUser = null;


async function loadChatUsers() {
  const res = await fetch(`${window.location.origin}/api/chat-users`);
  const data = await res.json();

  const list = document.getElementById("userList");

  list.innerHTML = data.map(u => `
    <div class="user" data-email="${u.email}" onclick="openChat('${u.email}')">
      ${u.email}
    </div>
  `).join("");
}

async function loadRequests() {
  const res = await fetch(`${window.location.origin}/api/admin/requests`);
  const data = await res.json();

  const list = document.getElementById("userList");

  list.innerHTML = data.map(r => `
    <div class="user">
      <strong>${r.name}</strong><br>
      ${r.email}<br>
      <small>${r.message}</small><br><br>

      ${
        (r.isRegisteredUser == 1 || r.isRegisteredUser === true)
          ? `<button onclick="openChat('${r.email}')">Start Chat</button>`
          : `<span style="color:gray;">Guest user</span>`
      }
    </div>
  `).join("");
}

function openChat(email) {
  currentUser = email;

  // highlight selected user
  document.querySelectorAll(".user").forEach(u => {
    u.classList.remove("active");
    if (u.dataset.email === email) {
      u.classList.add("active");
    }
  });

  document.getElementById("chatHeader").innerText = email;

  socket.emit("join", email);

  fetch(`${window.location.origin}/api/chat?email=${email}`)
    .then(res => res.json())
    .then(messages => {
      const chat = document.getElementById("chatBox");
      chat.innerHTML = "";

      if (messages.length === 0) {
        chat.innerHTML = `<p style="opacity:0.5;">No messages yet</p>`;
      }

      messages.forEach(m => {
        chat.innerHTML += `
          <div class="msg ${m.sender === "admin" ? "admin-msg" : "user-msg"}">
            ${m.message}
          </div>
        `;
      });

      chat.scrollTop = chat.scrollHeight;
    });
}

function sendReply() {
  const reply = document.getElementById("replyInput").value;

  if (!reply || !currentUser) return;

  socket.emit("admin_reply", {
    email: currentUser,
    reply
  });


  document.getElementById("replyInput").value = "";
}

socket.on("receive_message", (data) => {
  if (data.email === currentUser) {
    const chat = document.getElementById("chatBox");

    chat.innerHTML += `
      <div class="msg user-msg">${data.message}</div>
    `;

    chat.scrollTop = chat.scrollHeight;
  }
});


socket.on("receive_reply", (data) => {
  if (data.email === currentUser) {
    const chat = document.getElementById("chatBox");

    chat.innerHTML += `
      <div class="msg admin-msg">${data.reply}</div>
    `;

    chat.scrollTop = chat.scrollHeight;
  }
});

function logout() {
  localStorage.removeItem("user");
  window.location.href = "auth.html";
}

function goHome() {
  window.location.href = "index.html";
}


loadChatUsers(); // default tab
</script>

</body>
</html>
